<!DOCTYPE html>
<html>

<head>
    <title>Lark VM Sync</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            background: white;
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #333;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .result-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .result-details {
            font-size: 16px;
            line-height: 1.8;
        }

        .error-details {
            font-size: 14px;
            margin-top: 10px;
            opacity: 0.8;
        }

        .info-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            text-align: left;
        }

        .info-box strong {
            color: #333;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔄 Lark VM Sync</h1>
        <p class="subtitle">Analyze all pending VMs in your Lark base</p>

        <button onclick="syncVMs()" id="syncBtn">
            <span id="btnText">Start Sync</span>
        </button>

        <div id="result"></div>

        <div class="info-box">
            <strong>What this does:</strong><br>
            • Fetches VMs with Status="Pending"<br>
            • Analyzes with AI (using your existing analyzer)<br>
            • Updates Austina Score & AI Suggestion in Lark
        </div>
    </div>

    <script>
        async function syncVMs() {
            const btn = document.getElementById('syncBtn');
            const btnText = document.getElementById('btnText');
            const result = document.getElementById('result');

            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>Syncing...';
            result.style.display = 'none';

            try {
                const response = await fetch('http://localhost:3001/api/lark/sync-vms', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    result.className = 'success';
                    result.innerHTML = `
                        <div class="result-title">✅ Sync Complete!</div>
                        <div class="result-details">
                            <strong>Analyzed:</strong> ${data.analyzed} VMs<br>
                            <strong>Average Score:</strong> ${data.averageScore}/100<br>
                            ${data.failed > 0 ? `<strong>Failed:</strong> ${data.failed}<br>` : ''}
                            <br>
                            <small>Check your Lark base for updated scores!</small>
                        </div>
                    `;
                } else {
                    throw new Error(data.error || 'Sync failed');
                }
            } catch (error) {
                result.className = 'error';
                result.innerHTML = `
                    <div class="result-title">❌ Sync Failed</div>
                    <div class="result-details">
                        ${error.message}
                    </div>
                    <div class="error-details">
                        <strong>Troubleshooting:</strong><br>
                        1. Make sure server is running: <code>npm run server</code><br>
                        2. Verify Lark app permissions are set up<br>
                        3. Check at least one VM has Status="Pending"<br>
                        4. Ensure you're on the same network as the server
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Start Sync';
                result.style.display = 'block';
            }
        }

        // Check server status on load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch('http://localhost:3001/api/okrs');
                if (response.ok) {
                    console.log('✅ Server is running');
                }
            } catch (error) {
                const result = document.getElementById('result');
                result.className = 'error';
                result.innerHTML = `
                    <div class="result-title">⚠️ Server Not Running</div>
                    <div class="result-details">
                        Please start the server first:<br>
                        <code>npm run server</code>
                    </div>
                `;
                result.style.display = 'block';
            }
        });
    </script>
</body>

</html>
