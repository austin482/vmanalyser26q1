<!DOCTYPE html>
<html>

<head>
    <title>Lark VM Sync (New Workflow)</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            background: white;
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #333;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .workflow-steps {
            text-align: left;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .workflow-steps h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .step {
            padding: 10px 0;
            border-left: 3px solid #667eea;
            padding-left: 15px;
            margin: 10px 0;
        }

        .step-number {
            font-weight: 600;
            color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            margin: 10px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 2px solid #bee5eb;
        }

        .vm-list {
            margin-top: 15px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }

        .vm-item {
            padding: 8px;
            background: white;
            margin: 5px 0;
            border-radius: 6px;
            font-size: 14px;
        }

        .vm-item a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .vm-item a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔄 Lark VM Sync</h1>
        <p class="subtitle">New Workflow: Use Your App's Scores</p>

        <div class="workflow-steps">
            <h3>How It Works:</h3>
            <div class="step">
                <span class="step-number">Step 1:</span> Import VMs from Lark → App Database
            </div>
            <div class="step">
                <span class="step-number">Step 2:</span> Analyze in your localhost app (http://localhost:5173)
            </div>
            <div class="step">
                <span class="step-number">Step 3:</span> Export app's scores back to Lark
            </div>
        </div>

        <button onclick="importFromLark()" id="importBtn">
            <span id="importBtnText">Step 1: Import from Lark</span>
        </button>

        <button onclick="exportToLark()" id="exportBtn" disabled>
            <span id="exportBtnText">Step 3: Export to Lark</span>
        </button>

        <div id="result"></div>
    </div>

    <script>
        let needsAnalysis = [];

        async function importFromLark() {
            const btn = document.getElementById('importBtn');
            const btnText = document.getElementById('importBtnText');
            const result = document.getElementById('result');
            const exportBtn = document.getElementById('exportBtn');

            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>Importing...';
            result.style.display = 'none';

            try {
                const response = await fetch('http://localhost:3001/api/lark/import-and-sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();

                if (data.needsAnalysis > 0) {
                    needsAnalysis = data.vmsNeedingAnalysis;
                    result.className = 'info';
                    result.innerHTML = `
                        <div class="result-title">📥 Import Complete!</div>
                        <div class="result-details">
                            <strong>Imported:</strong> ${data.imported} VMs<br>
                            <strong>Already Analyzed:</strong> ${data.alreadyAnalyzed}<br>
                            <strong>Needs Analysis:</strong> ${data.needsAnalysis}<br>
                            <br>
                            <strong>Step 2:</strong> Analyze these VMs in your app:
                            <div class="vm-list">
                                ${needsAnalysis.map(vm => `
                                    <div class="vm-item">
                                        • <a href="${vm.analyzeUrl}" target="_blank">${vm.name}</a>
                                    </div>
                                `).join('')}
                            </div>
                            <br>
                            <small>After analyzing, click "Step 3: Export to Lark" below</small>
                        </div>
                    `;
                    exportBtn.disabled = false;
                } else {
                    result.className = 'success';
                    result.innerHTML = `
                        <div class="result-title">✅ All VMs Already Analyzed!</div>
                        <div class="result-details">
                            ${data.alreadyAnalyzed} VMs have analysis data.<br>
                            <br>
                            Click "Step 3: Export to Lark" to update Lark.
                        </div>
                    `;
                    exportBtn.disabled = false;
                }
            } catch (error) {
                result.className = 'error';
                result.innerHTML = `
                    <div class="result-title">❌ Import Failed</div>
                    <div class="result-details">${error.message}</div>
                `;
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Step 1: Import from Lark';
                result.style.display = 'block';
            }
        }

        async function exportToLark() {
            const btn = document.getElementById('exportBtn');
            const btnText = document.getElementById('exportBtnText');
            const result = document.getElementById('result');

            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>Exporting...';

            try {
                const response = await fetch('http://localhost:3001/api/lark/export-analyzed', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    result.className = 'success';
                    result.innerHTML = `
                        <div class="result-title">✅ Export Complete!</div>
                        <div class="result-details">
                            <strong>Exported:</strong> ${data.exported} VMs<br>
                            ${data.errors > 0 ? `<strong>Errors:</strong> ${data.errors}<br>` : ''}
                            <br>
                            <small>Check your Lark base for updated scores!</small>
                        </div>
                    `;
                } else {
                    throw new Error(data.error || 'Export failed');
                }
            } catch (error) {
                result.className = 'error';
                result.innerHTML = `
                    <div class="result-title">❌ Export Failed</div>
                    <div class="result-details">${error.message}</div>
                `;
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Step 3: Export to Lark';
                result.style.display = 'block';
            }
        }

        // Check server status on load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch('http://localhost:3001/api/okrs');
                if (response.ok) {
                    console.log('✅ Server is running');
                }
            } catch (error) {
                const result = document.getElementById('result');
                result.className = 'error';
                result.innerHTML = `
                    <div class="result-title">⚠️ Server Not Running</div>
                    <div class="result-details">
                        Please start the server first:<br>
                        <code>npm run server</code>
                    </div>
                `;
                result.style.display = 'block';
            }
        });
    </script>
</body>

</html>
