<!DOCTYPE html>
<html>

<head>
    <title>Test OpenAI API</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #fff;
        }

        pre {
            background: #2d2d2d;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }

        .success {
            color: #4ade80;
        }

        .error {
            color: #f87171;
        }

        .info {
            color: #60a5fa;
        }
    </style>
</head>

<body>
    <h1>🤖 OpenAI API Test</h1>
    <div id="output"></div>

    <script type="module">
        import { analyzeComprehensive } from './src/services/analyzer.js?v=20251211';
        import { makeDecision } from './src/services/decisionMaker.js';

        const output = document.getElementById('output');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = msg;
            output.appendChild(div);
        }

        async function test() {
            try {
                log('🚀 Starting test...', 'info');

                const vm = {
                    metricName: "Auto-Update Job Application Status in Profile",
                    description: "Automatically sync and display job application status updates in the jobseeker's profile dashboard",
                    baselineRate: "15",
                    targetRate: "45",
                    minVolume: "2000",
                    bu: "JS Product",
                    selectedOKR: "okr-test-kr-001",
                    okrRationale: "Real-time status visibility keeps jobseekers engaged"
                };

                const okr = {
                    id: "okr-test",
                    quarter: "2025 Q4",
                    buName: "JS Product",
                    objective: "Happy Jobseeker",
                    keyResults: [{
                        id: "kr-001",
                        category: "Outcome",
                        metrics: ["Number of jobseekers with positive result behavior"]
                    }]
                };

                log('📊 Analyzing VM...', 'info');
                const analysis = await analyzeComprehensive(vm, okr);
                const decision = makeDecision(analysis, vm);

                log('✅ Analysis Complete!', 'success');
                log('Score: ' + decision.decision.final_score + '/100', 'success');
                log('Verdict: ' + decision.decision.verdict, 'success');
                log('Agent: ' + analysis.agent, 'success');

                log('\n📋 Full Analysis:', 'info');
                log(JSON.stringify(analysis, null, 2), 'info');

            } catch (error) {
                log('❌ Error: ' + error.message, 'error');
                log(error.stack, 'error');
            }
        }

        // Auto-run on load
        test();
    </script>
</body>

</html>
